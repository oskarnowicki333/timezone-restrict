# DigitalOcean App Platform spec.
# Import: doctl apps create --spec .do/app.yaml
# Or in the UI: Create App -> pick your GitHub repo (App Platform auto-detects Python
# from requirements.txt), then set the run command + env vars below.
#
# Replace `your-github-user/timezone-restrict` and `branch` with your real repo/branch.
name: timezone-restrict
region: nyc
services:
  - name: timezone-restrict
    github:
      repo: oskarnowicki333/timezone-restrict
      branch: main
      deploy_on_push: true
    run_command: uvicorn main:app --host 0.0.0.0 --port ${PORT:-8080}
    environment_slug: python
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /health
    envs:
      - key: ALLOWED_TIMEZONES
        scope: RUN_TIME
        value: "Asia/Tokyo"
      - key: RESPONSE_TEXT
        scope: RUN_TIME
        value: "OK"
      - key: SUCCESS_STATUS
        scope: RUN_TIME
        value: "200"
      - key: ERROR_TEXT
        scope: RUN_TIME
        value: "Forbidden"
      - key: ERROR_STATUS
        scope: RUN_TIME
        value: "403"
      - key: RATE_LIMIT
        scope: RUN_TIME
        value: "60/minute"
